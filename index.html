<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHA: All's Justice — 3v3 Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--hero:#1A8CFF;--villain:#FF3A3A;--gold:#FFD700;--dark:#07080F;--panel:#0E1018;--card:#12141E;--border:#1E2235;--text:#E8EEFF;--dim:#555A70;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 35% at 15% 5%,rgba(26,140,255,0.08) 0%,transparent 70%),radial-gradient(ellipse 45% 30% at 85% 85%,rgba(255,58,58,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Bangers',cursive;font-size:clamp(1.8rem,7vw,3.2rem);letter-spacing:0.08em;line-height:1;color:var(--text);}
.title .hero{color:var(--hero);}.title .villain{color:var(--villain);}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pill{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#0A0C14;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--hero);color:var(--text);}
.pill.active{background:var(--hero);border-color:var(--hero);color:#fff;}
.pill.villain-pill.active{background:var(--villain);border-color:var(--villain);}
.pill.dlc-pill.active{background:#9B30FF;border-color:#9B30FF;}
.btn-wrap{display:flex;justify-content:center;margin-top:4px;}
.btn-gen{font-family:'Bangers',cursive;font-size:1.2rem;letter-spacing:0.12em;background:linear-gradient(135deg,#1A8CFF,#0055CC);color:#fff;border:none;border-radius:8px;padding:13px 40px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(26,140,255,0.4);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:18px;}
.teams-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:start;}
.team-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;}
.team-header{font-family:'Bangers',cursive;font-size:1rem;letter-spacing:0.12em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.team-header.joe{color:var(--hero);}.team-header.jack{color:var(--villain);}
.fighter-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #14172A;font-size:0.82rem;}
.fighter-row:last-child{border-bottom:none;}
.f-num{font-family:'Bangers',cursive;font-size:0.85rem;color:var(--dim);width:18px;flex-shrink:0;}
.f-role{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;padding:2px 6px;border-radius:10px;flex-shrink:0;}
.f-role.main{background:rgba(255,215,0,0.15);color:var(--gold);}
.f-role.side{background:rgba(255,255,255,0.06);color:var(--dim);}
.vs-col{display:flex;align-items:center;justify-content:center;padding-top:18px;}
.vs-badge{font-family:'Bangers',cursive;font-size:1.2rem;letter-spacing:0.08em;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.4);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--hero);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--hero);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#A0AACC;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--hero);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>
<body>
<div class="header">
  <div class="title"><span class="hero">MHA</span>: All's <span class="villain">Justice</span></div>
  <div class="subtitle">3v3 Battle Generator — Joe vs CPU</div>
</div>
<div class="card">
  <div class="filter-row">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="class1a">Class 1-A</div>
    <div class="pill" data-filter="pro">Pro Heroes</div>
    <div class="pill villain-pill" data-filter="villain">Villains</div>
    <div class="pill villain-pill" data-filter="lov">League of Villains</div>
    <div class="pill" data-filter="deku">Deku Forms</div>
    <div class="pill dlc-pill" data-filter="dlc">DLC</div>
  </div>
  <div class="btn-wrap">
    <button class="btn-gen" id="genBtn">⚡ PLUS ULTRA — GENERATE!</button>
  </div>
  <div id="result">
    <div class="teams-row">
      <div class="team-panel"><div class="team-header joe">Joe's Team</div><div id="teamJoe"></div></div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="team-panel"><div class="team-header jack">CPU's Team</div><div id="teamCpu"></div></div>
    </div>
    <div class="scenario-box">
      <div class="scenario-label">📋 Battle Scenario</div>
      <div class="scenario-text" id="scenarioText"></div>
      <button class="tts-btn" id="ttsBtn" style="display:none" onclick="(function(b){const t=document.getElementById(\'scenarioText\');speakScenario(b,t.innerText);})(this)">🔊 Read Aloud</button>
    </div>
  </div>
</div>
<script>
const ALL = [
  // Deku forms
  {n:"Izuku Midoriya",t:["class1a","deku"]},{n:"Izuku Midoriya (Shoot Style)",t:["class1a","deku"]},{n:"Izuku Midoriya (Full Cowling 100%)",t:["class1a","deku"]},{n:"Izuku Midoriya (One For All)",t:["class1a","deku"]},{n:"Izuku Midoriya (Rising)",t:["class1a","deku"]},
  // Class 1-A
  {n:"Katsuki Bakugo",t:["class1a"]},{n:"Shoto Todoroki",t:["class1a"]},{n:"Ochaco Uraraka",t:["class1a"]},{n:"Tenya Iida",t:["class1a"]},{n:"Eijiro Kirishima",t:["class1a"]},{n:"Fumikage Tokoyami",t:["class1a"]},{n:"Denki Kaminari",t:["class1a"]},{n:"Momo Yaoyorozu",t:["class1a"]},{n:"Kyoka Jiro",t:["class1a"]},{n:"Mina Ashido",t:["class1a"]},{n:"Hanta Sero",t:["class1a"]},{n:"Mashirao Ojiro",t:["class1a"]},{n:"Toru Hagakure",t:["class1a"]},{n:"Tsuyu Asui",t:["class1a"]},{n:"Koji Koda",t:["class1a"]},{n:"Mezo Shoji",t:["class1a"]},{n:"Rikido Sato",t:["class1a"]},{n:"Minoru Mineta",t:["class1a"]},{n:"Yuga Aoyama",t:["class1a"]},{n:"Hitoshi Shinso",t:["class1a"]},
  // Big 3 & Others
  {n:"Mirio Togata",t:["class1a"]},{n:"Tamaki Amajiki",t:["class1a"]},{n:"Nejire Hado",t:["class1a"]},{n:"Neito Monoma",t:["class1a"]},
  // Pro Heroes
  {n:"All Might",t:["pro"]},{n:"Armored All Might",t:["pro"]},{n:"Endeavor",t:["pro"]},{n:"Hawks",t:["pro"]},{n:"Mirko",t:["pro"]},{n:"Best Jeanist",t:["pro"]},{n:"Shota Aizawa",t:["pro"]},{n:"Present Mic",t:["pro"]},{n:"Midnight",t:["pro"]},{n:"Edge Shot",t:["pro"]},{n:"Lady Nagant",t:["pro","villain"]},
  // Villains
  {n:"Tomura Shigaraki",t:["villain","lov"]},{n:"Tomura Shigaraki (All For One)",t:["villain","lov"]},{n:"All For One",t:["villain","lov"]},{n:"All For One (Rewind)",t:["villain","lov"]},{n:"All For One (Chaos)",t:["villain","lov"]},{n:"Dabi",t:["villain","lov"]},{n:"Dabi (Flame of Death)",t:["villain","lov"]},{n:"Himiko Toga",t:["villain","lov"]},{n:"Twice",t:["villain","lov"]},{n:"Mr. Compress",t:["villain","lov"]},{n:"Kurogiri",t:["villain","lov"]},{n:"Stain",t:["villain"]},{n:"High End Nomu",t:["villain"]},
  // DLC
  {n:"Star and Stripe",t:["pro","dlc"]},{n:"Nana Shimura",t:["pro","dlc"]},
];

const SCENARIOS = [
  "Shigaraki has activated his decay Quirk on a scale no one predicted, and the only thing standing between total collapse and survival is {A}'s squad — but {B}'s team showed up to the same battlefield with completely different orders.",
  "Twice's Quirk was preserved in a data fragment retrieved by a rogue scientist, who has used it to clone an entire villain task force. {A}'s team arrived to contain the clone outbreak; {B}'s squad was sent to destroy the lab — which {A}'s team is currently standing inside.",
  "All For One's final contingency activated — a sleeper Quirk planted in hero society years ago that forces anyone carrying One For All energy into a combat response. {A}'s fighters have been partially affected.",
  "The UA Sports Festival was hacked. Someone fed false intel into the tournament bracket, pulling both heroes and villain trainees into an off-campus arena that sealed itself on entry. The system keeps saying the match only ends when one team can't fight.",
  "Dabi's flames have spread into a thermal Quirk amplifier buried under the city. {A}'s team is trying to shut it down from inside. {B}'s team was sent to collapse the whole structure. The explosion window is closing.",
  "Hawks fed both teams the same double-blind mission because he needed to know which group would crack under pressure. {A} was told {B}'s squad had been compromised. {B} was told {A}'s team had gone rogue. Hawks is watching from a rooftop with a notepad.",
  "Lady Nagant's rifle round shattered a containment unit holding a Quirk-suppression field now expanding outward, randomly canceling heroes' Quirks on one side and amplifying villains' on the other. {A}'s team landed in the wrong zone.",
  "All Might's final form has been reverse-engineered by a black-market Quirk dealer. {B}'s fighters took the boost before the mission; {A}'s team didn't know. The boost is destabilizing. {A}'s team has been tasked with suppressing them before the surge levels three city blocks.",
  "Shigaraki's final decay wave unraveled a sealed Quirk archive the Hero Commission had buried decades ago, flooding the district with dormant abilities looking for hosts. Every fighter has been randomly assigned a second Quirk they don't know how to control.",
  "Stain escaped. Again. This time he released a manifesto naming specific heroes as frauds — and {A}'s team is on the list. {B}'s squad has been ordered to bring {A}'s fighters in for commission review before Stain targets them.",
  "Star and Stripe's New Order Quirk has malfunctioned at a catastrophic scale, declaring a new rule that rewrites the laws of physics across an entire district. {A} and {B}'s teams are both inside the affected zone. The only way to cancel the rule is to find Star and Stripe — somewhere in the middle of both squads.",
  "Nana Shimura's ghost has been detected at a fault line between the living world and the next. The Hero Commission wants the intel she carries. The League wants to use her presence to break Shigaraki's remaining hesitation. Neither team is willing to let the other get there first.",
  "The Paranormal Liberation Front's last contingency was a Quirk designed to make UA's top heroes fight each other. It was embedded in a document that both {A} and {B}'s team leaders signed. The Quirk just activated.",
  "A massive Nomu was deployed in a residential district and both teams responded simultaneously. The Nomu is defeated. The collateral damage budget for this sector has been exceeded. The commission is sending one team home early. Both teams are fighting over which one gets to stay and finish the civilian evacuation.",
  "Himiko Toga used her Quirk to copy a hero's appearance at exactly the wrong moment, triggering an emergency protocol that locked down the entire district and flagged every powered individual inside as a threat. {A} and {B}'s teams were both inside the perimeter when it sealed.",
  "The Quirk-erasing bullets developed from Eri's blood were supposed to be destroyed. One wasn't. It's in a sealed case in the middle of this arena. Both teams received orders to retrieve it. Neither team's orders mentioned the other team.",
  "Class 1-A's final exam was supposed to be against Pro Hero simulations. Aizawa made a last-minute change. He didn't inform anyone what the change was. Both {A} and {B}'s teams showed up expecting the simulation. They got each other.",
  "Endeavor's sidekick information network flagged both teams as being in the same sector pursuing overlapping targets. The targets turned out to be the same person. That person is gone now. What's left is two teams in the same location with the same frustration.",
  "Present Mic's voice Quirk echoed through the underground arena at a specific frequency that resonates with combat-oriented Quirks. Every hero and villain in range has had their fighting instinct amplified to maximum. Present Mic is deeply apologetic about this.",
  "The Hero Public Safety Commission issued simultaneous deployment orders to both teams — one to capture, one to neutralize — for the same target. The target has already escaped. Both teams are left with deployment orders they can't rescind and opponents who technically are not the target.",
  "Kurogiri opened a warp gate to evacuate injured heroes, but something inside the Nomu network corrupted his coordinates. {A}'s team came through one end of the gate. {B}'s team fell through a second gate that shouldn't exist. Both groups are now in the same sealed void.",
  "All For One's backup personality has activated inside a recovered hard drive. The personality is broadcasting a signal that overrides the threat-assessment Quirks of any hero within range. Both {A} and {B}'s teams are in range. Their threat assessments are currently pointing at each other.",
  "Mirio's Permeation Quirk interacted with a warp gate during a rescue mission and created a phase space where everything is partially intangible. Both teams are inside the phase space. Physical impacts work at sixty percent efficiency. Quirks work at one hundred and forty percent.",
  "The license exam threw up an unprecedented scenario — both teams were assigned to the same evacuation zone at the same time with contradictory instructions. The exam is pass-fail. Both teams need a passing evaluation. There's only one available scenario outcome. Two teams. One pass.",
  "Deku's One For All has been reverberating more intensely lately. The previous users' quirks are louder. Today, the reverb pulled two teams from different locations to the same coordinates — the epicenter of the resonance is the floor of this arena, thirty meters below their feet.",
  "Gran Torino tracked a villain to this location. The villain isn't here. Two hero teams are. Gran Torino is watching from the ceiling at three hundred kilometers per hour and has decided this is a learning opportunity for everyone involved.",
  "Recovery Girl's healing Quirk has limits. Both teams know this. The agreement going into this fight was that no one dies. Everything else is permitted. That agreement was made by team leaders who may not fully control their teams.",
  "The Villain Factory's final product was a Quirk that makes nearby Quirk users perceive each other as the villain they most fear. {A}'s team sees {B}'s team as their worst nightmare. {B}'s team sees the same thing in reverse. Neither side has a way to communicate through the perception filter.",
  "A hospital district has been targeted by a new villain with a Quirk that reverses healing. The medical district can't operate while the Quirk is active. Both hero teams were deployed to stop the villain. The villain was stopped ten minutes ago. Both teams are still in the medical district, which means they're both in the exclusion zone, which means the automated barrier system has sealed both of them inside.",
  "Best Jeanist's capture weapon system malfunctioned during a field test and ensnared both teams simultaneously. The system releases when it detects that combat has concluded. Both teams have independently reached the same conclusion — the fastest way to trigger the release is to make one side look clearly defeated.",
];

let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){return activeFilter==='all'?ALL:ALL.filter(c=>c.t.includes(activeFilter));}
function pickTeam(pool,exclude=[]){return shuffle(pool.filter(c=>!exclude.includes(c.n))).slice(0,3);}
function renderTeam(team,id){document.getElementById(id).innerHTML=team.map((f,i)=>`<div class="fighter-row"><span class="f-num">${i+1}</span><span class="f-role ${i===0?'main':'side'}">${i===0?'MAIN':'SIDE'}</span><span>${f.n}</span></div>`).join('');}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<6){alert('Not enough fighters in this filter. Try All.');return;}
  const joe=pickTeam(pool), jack=pickTeam(pool,joe.map(f=>f.n));
  renderTeam(joe,'teamJoe');renderTeam(jack,'teamCpu');
  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';
  const t=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
  typewrite(document.getElementById('scenarioText'),t.replace(/\{A\}/g,joe[0].n).replace(/\{B\}/g,jack[0].n));
});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen synchronously before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // stop if already playing
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
